<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="打つと、ことばの意味に合わせて文字が反応するタイピングゲーム。">
    <meta property="og:type" content="website">
    <meta property="og:title" content="モジリアクト">
    <meta property="og:description" content="打つと、ことばの意味に合わせて文字が反応する。">
    <meta property="og:image" content="assets/ogp.svg">
    <meta name="twitter:card" content="summary_large_image">
    <title>モジリアクト</title>
    <link rel="stylesheet" href="styles.css?v=signature-effects-v2">
  </head>
  <body>
    <main class="game" aria-label="モジリアクト">
      <canvas id="fxCanvas" aria-hidden="true"></canvas>

      <section class="top">
        <div>
          <p class="eyebrow">WORDS REACT</p>
          <h1>モジリアクト</h1>
        </div>
        <div class="stats" aria-label="成績">
          <div>
            <span>TIME</span>
            <strong id="timeText">60</strong>
          </div>
          <div>
            <span>SCORE</span>
            <strong id="scoreText">0</strong>
          </div>
          <div>
            <span>ACC</span>
            <strong id="accuracyText">100%</strong>
          </div>
        </div>
      </section>

      <section class="card" id="startPanel">
        <div class="startHero">
          <div class="startCopy">
            <p class="startMode">60 SEC WORD REACTION</p>
            <p class="lead">打つたび、ことばの意味が文字に出る。</p>
            <button id="startButton" type="button">始める</button>
          </div>

          <div class="reactPreview" aria-label="文字反応の例">
            <div class="previewLine preview-faint">
              <span>faint</span>
              <strong>存在感薄い</strong>
              <em>sonzaikanusui</em>
            </div>
            <div class="previewLine preview-speed">
              <span>speed</span>
              <strong>爆速返信</strong>
              <em>bakusokuhenshin</em>
            </div>
            <div class="previewLine preview-secret">
              <span>secret</span>
              <strong>小声で相談</strong>
              <em>kogoedesoudan</em>
            </div>
            <div class="previewLine preview-fire">
              <span>burst</span>
              <strong>限界突破</strong>
              <em>genkaitoppa</em>
            </div>
          </div>
        </div>
      </section>

      <section class="card play" id="playPanel" hidden>
        <div class="prompt">
          <p id="wordText" class="word">準備</p>
          <p id="readingText" class="reading">じゅんび</p>
        </div>

        <div class="romaji" id="romajiText" aria-label="入力するローマ字"></div>
        <p class="routeHint" id="routeHint">入力方法は自由です。</p>

        <label class="inputWrap">
          <span>TYPE</span>
          <input id="typingInput" type="text" autocomplete="off" autocapitalize="off" spellcheck="false" inputmode="latin">
        </label>

        <p class="message" id="messageText">Enterで開始できます。</p>
      </section>

      <section class="card result" id="resultPanel" hidden>
        <p class="resultLabel">RESULT</p>
        <h2 id="resultTitle">終了</h2>
        <p id="resultText"></p>
        <div class="resultStats" aria-label="結果">
          <div>
            <span>WORDS</span>
            <strong id="resultWords">0</strong>
          </div>
          <div>
            <span>SCORE</span>
            <strong id="resultScore">0</strong>
          </div>
          <div>
            <span>ACC</span>
            <strong id="resultAccuracy">100%</strong>
          </div>
        </div>
        <pre id="sharePreview" class="sharePreview"></pre>
        <div class="resultActions">
          <button id="retryButton" type="button">もう一度</button>
          <button id="shareButton" class="subButton" type="button">結果をコピー</button>
        </div>
      </section>
    </main>

    <script src="romaji-engine.js?v=signature-effects-v2"></script>
    <script src="script.js?v=signature-effects-v2"></script>
  </body>
</html>
