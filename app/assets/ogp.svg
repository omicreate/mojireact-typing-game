<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">モジリアクト</title>
  <desc id="desc">打つと、ことばの意味に合わせて文字が反応するタイピングゲーム。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#080a10"/>
      <stop offset="0.48" stop-color="#11192a"/>
      <stop offset="1" stop-color="#070b12"/>
    </linearGradient>
    <linearGradient id="react" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#9effb3"/>
      <stop offset="0.52" stop-color="#58dcff"/>
      <stop offset="1" stop-color="#ff9fde"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="220" cy="120" r="260" fill="#58dcff" opacity="0.12"/>
  <circle cx="1020" cy="510" r="250" fill="#9effb3" opacity="0.10"/>
  <path d="M-40 510 C170 430 290 260 520 300 S870 520 1240 210" fill="none" stroke="url(#react)" stroke-width="12" opacity="0.9" filter="url(#glow)"/>
  <path d="M-20 420 C210 370 430 90 680 150 S930 320 1230 88" fill="none" stroke="#edf7ff" stroke-width="5" opacity="0.42"/>
  <g opacity="0.65">
    <rect x="760" y="104" width="12" height="420" fill="#58dcff" transform="rotate(26 766 314)" opacity="0.16"/>
    <rect x="920" y="70" width="10" height="480" fill="#ff9fde" transform="rotate(26 925 310)" opacity="0.14"/>
    <rect x="120" y="70" width="9" height="490" fill="#9effb3" transform="rotate(26 125 315)" opacity="0.12"/>
  </g>
  <text x="82" y="152" fill="#58dcff" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="900">WORDS REACT</text>
  <text x="78" y="335" fill="#edf7ff" font-family="Inter, 'Hiragino Sans', 'Yu Gothic', sans-serif" font-size="112" font-weight="900" letter-spacing="-2">モジリアクト</text>
  <text x="85" y="405" fill="#d9e9f4" font-family="Inter, 'Hiragino Sans', 'Yu Gothic', sans-serif" font-size="36" font-weight="800">打つたび、ことばの意味が文字に出る。</text>
  <g transform="translate(86 462)" font-family="Inter, Arial, sans-serif" font-weight="900">
    <rect width="230" height="68" rx="8" fill="#061017" stroke="#58dcff" opacity="0.9"/>
    <text x="30" y="45" fill="#9effb3" font-size="34">sya / sha</text>
    <rect x="252" width="210" height="68" rx="8" fill="#061017" stroke="#9effb3" opacity="0.9"/>
    <text x="282" y="45" fill="#58dcff" font-size="34">xtu / tta</text>
  </g>
</svg>
